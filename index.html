<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
    font-family: Arial;
    background-image:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('memphis-depay-corinthians-palmeiras-gol-e1753929740215.webp');

    background-size: cover;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:350px;
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    color:white;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:white;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>LOGIN</h1>

<form action="principal.html">

<label>Usuário ou E-mail</label>
<input type="text" required>

<label>Senha</label>
<input type="password" required>

<button type="submit">ENTRAR</button>

</form>

<br>

<a href="cadastro_usuario.html">
Cadastrar Usuário
</a>

</div>

</body>
</html>
